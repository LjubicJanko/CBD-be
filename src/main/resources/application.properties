# Server configuration
server.port=8080

# Application name
spring.application.name=order-tracker

# Datasource configuration for Railway-hosted MySQL
spring.datasource.url=jdbc:mysql://autorack.proxy.rlwy.net:16875/railway?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=JtSAlxUstoszJEQmVaggbIzQIotWvTDj
# For non-prod runs, use a Spring profile (application-staging.properties or
# application-local.properties) — both are gitignored so secrets stay out of the repo.

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA and Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=2MB

spring.jpa.defer-datasource-initialization=true
# To seed the DB, flip ddl-auto to "create" AND set sql.init.mode to "always".
# Otherwise leave on "never" so data.sql doesn't run against an existing schema.
spring.sql.init.mode=never


# Server configuration
server.port=8080

# Application name
spring.application.name=order-tracker

# Datasource — env-driven, no defaults so the app fails loudly if a var is missing.
# For local dev, set these in application-local.properties (gitignored) and run with
# --spring.profiles.active=local, or set them as environment variables.
# For staging, application-staging.properties (also gitignored) works the same way.
# See application.properties.example for the template.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA and Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=2MB

spring.jpa.defer-datasource-initialization=true
# To seed the DB, flip ddl-auto to "create" AND set sql.init.mode to "always".
# Otherwise leave on "never" so data.sql doesn't run against an existing schema.
spring.sql.init.mode=never

# JWT configuration — secret key is env-driven; rotating it invalidates all sessions.
security.jwt.secret-key=${SECURITY_JWT_SECRET_KEY}
security.jwt.expiration-time=86400000
